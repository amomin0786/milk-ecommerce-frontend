<section class="max-w-7xl mx-auto px-4 py-10">
  <div class="flex items-end justify-between">
    <div>
      <h2 class="text-3xl font-bold">Cart</h2>
      <p class="text-gray-600 mt-1">Review your items.</p>
    </div>

    <a routerLink="/shop/products" class="px-4 py-2 rounded-2xl border hover:bg-gray-50">
      Continue shopping
    </a>
  </div>

  <div class="mt-6 grid lg:grid-cols-3 gap-6">
    <!-- Items -->
    <div class="lg:col-span-2 rounded-3xl border bg-white p-5">
      <div *ngIf="items.length === 0" class="text-gray-600 text-center py-10">
        Your cart is empty.
      </div>

      <div
        *ngFor="let i of items"
        class="py-4 border-b last:border-b-0 flex items-center justify-between gap-4"
      >
        <div>
          <div class="font-semibold">{{ i?.product?.name || i?.name }}</div>
          <div class="text-sm text-gray-600">
            ₹{{ i?.product?.price ?? i?.price ?? 0 }} each
          </div>
        </div>

        <div class="flex items-center gap-2">
          <button
            type="button"
            class="px-3 py-2 rounded-xl border disabled:opacity-50"
            (click)="dec(i)"
            [disabled]="updating"
          >
            -
          </button>

          <div class="min-w-[36px] text-center font-semibold">
            {{ i?.quantity ?? 1 }}
          </div>

          <button
            type="button"
            class="px-3 py-2 rounded-xl border disabled:opacity-50"
            (click)="inc(i)"
            [disabled]="updating"
          >
            +
          </button>
        </div>

        <div class="font-bold">
          ₹{{ (i?.product?.price ?? i?.price ?? 0) * (i?.quantity ?? 1) }}
        </div>

        <button
          type="button"
          class="px-3 py-2 rounded-xl border hover:bg-gray-50 disabled:opacity-50"
          (click)="remove(i)"
          [disabled]="updating"
        >
          Remove
        </button>
      </div>
    </div>

    <!-- Summary -->
    <div class="rounded-3xl border bg-white p-5 h-fit">
      <div class="text-lg font-semibold">Summary</div>

      <div class="mt-4 flex justify-between text-gray-700">
        <div>Total</div>
        <div class="font-bold">₹{{ total }}</div>
      </div>

      <button
        type="button"
        class="mt-6 w-full px-4 py-3 rounded-2xl bg-black text-white hover:opacity-90 disabled:opacity-50"
        [disabled]="items.length === 0 || updating"
        (click)="checkout()"
      >
        Checkout
      </button>
    </div>
  </div>
</section>
