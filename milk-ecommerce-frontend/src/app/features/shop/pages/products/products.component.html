<section class="max-w-7xl mx-auto px-4 py-10">
  <div class="flex flex-col md:flex-row md:items-end gap-4 justify-between">
    <div>
      <h2 class="text-3xl font-bold">Products</h2>
      <p class="text-gray-600 mt-1">Browse fresh dairy products.</p>
    </div>

    <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
      <input
        class="w-full sm:w-72 px-4 py-3 rounded-2xl border focus:outline-none"
        placeholder="Search products..."
        [(ngModel)]="q"
      />
      <select
        class="w-full sm:w-48 px-4 py-3 rounded-2xl border bg-white"
        [(ngModel)]="category"
      >
        <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
      </select>
    </div>
  </div>

  <div *ngIf="loading" class="py-10 text-center text-gray-600">Loading products...</div>
  <div *ngIf="!loading && error" class="mt-6 rounded-2xl border bg-white p-4 text-red-600">{{ error }}</div>

  <div *ngIf="!loading && !error" class="mt-6 grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
    <div *ngFor="let p of filtered" class="rounded-3xl border bg-white p-4 hover:shadow-sm transition">
      <div class="h-40 rounded-2xl bg-gray-50 border overflow-hidden flex items-center justify-center">
        <img *ngIf="p.imageUrl" [src]="p.imageUrl" [alt]="p.name" class="h-full w-full object-cover" />
        <div *ngIf="!p.imageUrl" class="text-gray-400">No Image</div>
      </div>

      <div class="mt-4">
        <div class="text-xs text-gray-500">
          {{ p.categoryName || '—' }}
          <span class="mx-2">•</span>
          Stock: <b>{{ p.stock }}</b>
        </div>

        <div class="font-semibold text-lg mt-1">{{ p.name }}</div>
        <div class="text-sm text-gray-600 mt-1 line-clamp-2">{{ p.description || 'No description' }}</div>

        <div class="mt-4 flex items-center justify-between">
          <div class="text-xl font-bold">₹{{ p.price }}</div>
          <button (click)="addToCart(p)" class="px-4 py-2 rounded-2xl bg-black text-white hover:opacity-90">
            Add
          </button>
        </div>
      </div>
    </div>

    <div *ngIf="filtered.length === 0" class="col-span-full text-center text-gray-600 py-10">
      No products found.
    </div>
  </div>
</section>
