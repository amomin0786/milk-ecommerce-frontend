<section class="max-w-5xl mx-auto px-4 py-10">
  <div class="flex items-end justify-between gap-3">
    <div>
      <h2 class="text-3xl font-bold">Order #{{ orderId }}</h2>
      <p class="text-gray-600 mt-1">Items in this order.</p>
    </div>
    <button class="px-4 py-2 rounded-xl border" (click)="load()">Refresh</button>
  </div>

  <div *ngIf="loading" class="py-10 text-center text-gray-600">Loading...</div>
  <div *ngIf="!loading && err" class="mt-6 rounded-2xl border bg-white p-4 text-red-600">{{ err }}</div>

  <div *ngIf="!loading && !err" class="mt-6 grid gap-4">

    <div *ngFor="let it of items" class="rounded-3xl border bg-white p-5 flex gap-4">
      <img
        *ngIf="it?.product?.imageUrl"
        class="h-20 w-20 rounded-2xl object-cover border"
        [src]="environment.apiBaseUrl + it.product.imageUrl"
        alt=""
      />

      <div class="flex-1">
        <div class="font-semibold text-lg">{{ it?.product?.name || 'Product' }}</div>
        <div class="text-sm text-gray-600 mt-1">
          Qty: <b>{{ it?.quantity }}</b>
          <span class="mx-2">•</span>
          Price: <b>₹{{ it?.price }}</b>
        </div>
        <div class="text-sm mt-1">
          Line Total: <b>₹{{ (it?.price || 0) * (it?.quantity || 1) }}</b>
        </div>
      </div>
    </div>

    <div class="rounded-3xl border bg-white p-5 flex items-center justify-between">
      <div class="font-semibold">Grand Total</div>
      <div class="text-xl font-bold">₹{{ total }}</div>
    </div>

    <div class="mt-4 p-4 border rounded-2xl bg-white">
      <div class="flex items-center justify-between">
        <div>
          <div class="text-sm text-gray-500">Status</div>
          <div class="font-semibold">{{ order?.orderStatus || '-' }}</div>
        </div>

        <button
          *ngIf="order?.orderStatus === 'PENDING'"
          (click)="cancelOrder()"
          class="px-4 py-2 rounded-xl border bg-red-600 text-white">
          Cancel Order
        </button>
      </div>

      <div *ngIf="order?.orderStatus === 'PENDING'" class="mt-3">
        <label class="text-sm text-gray-600">Cancel reason (optional)</label>
        <input class="w-full mt-1 px-3 py-2 border rounded-xl"
               [(ngModel)]="cancelReason"
               placeholder="Reason..." />
      </div>
    </div>

    <div *ngIf="items.length === 0" class="text-center text-gray-600 py-10">
      No items found.
    </div>

  </div>
</section>
