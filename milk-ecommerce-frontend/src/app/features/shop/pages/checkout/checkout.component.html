<section class="max-w-xl mx-auto px-4 py-10">
  <div class="rounded-3xl border bg-white p-6">
    <h2 class="text-2xl font-bold">Checkout</h2>
    <p class="text-gray-600 mt-1">Enter delivery address, choose payment method and continue.</p>

    <div *ngIf="err" class="mt-4 p-3 rounded-2xl border bg-red-50 text-red-700">
      {{ err }}
    </div>

    <div class="mt-6 grid gap-4">
      <div>
        <label class="text-sm text-gray-600">Customer Name</label>
        <input
          type="text"
          class="mt-2 w-full px-4 py-3 rounded-2xl border bg-white"
          [(ngModel)]="customerName"
          placeholder="Enter full name"
        />
      </div>

      <div>
        <label class="text-sm text-gray-600">Phone Number</label>
        <input
          type="text"
          maxlength="10"
          class="mt-2 w-full px-4 py-3 rounded-2xl border bg-white"
          [(ngModel)]="customerPhone"
          placeholder="Enter 10 digit mobile number"
        />
      </div>

      <div>
        <label class="text-sm text-gray-600">Delivery Address</label>
        <textarea
          rows="4"
          class="mt-2 w-full px-4 py-3 rounded-2xl border bg-white resize-none"
          [(ngModel)]="shippingAddress"
          placeholder="House no, street, area, landmark..."
        ></textarea>
      </div>

      <div>
        <label class="text-sm text-gray-600">Payment Method</label>
        <select
          class="mt-2 w-full px-4 py-3 rounded-2xl border bg-white"
          [(ngModel)]="paymentMethod"
        >
          <option value="COD">Cash on Delivery</option>
          <option value="RAZORPAY">Razorpay</option>
        </select>
      </div>

      <div class="mt-2 text-sm text-gray-600">
        Payable Amount: <b>₹{{ amount }}</b>
      </div>

      <button
        type="button"
        class="mt-2 px-5 py-3 rounded-2xl bg-black text-white hover:opacity-90 disabled:opacity-50"
        [disabled]="loading"
        (click)="place()"
      >
        {{ loading ? 'Loading...' : 'Continue to Payment' }}
      </button>
    </div>
  </div>
</section>
