<section class="max-w-3xl mx-auto px-4 py-10">
  <div class="rounded-3xl border bg-white p-6 shadow-sm">
    <h2 class="text-3xl font-bold">Apply to Become Seller</h2>
    <p class="text-gray-600 mt-1">Submit your shop details to request seller approval.</p>

    <div *ngIf="err" class="mt-5 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-red-700">
      {{ err }}
    </div>

    <div *ngIf="success" class="mt-5 rounded-2xl border border-green-200 bg-green-50 px-4 py-3 text-green-700">
      {{ success }}
    </div>

    <div class="mt-6 space-y-4">
      <div>
        <label class="block text-sm font-semibold text-gray-700">Shop Name</label>
        <input
          [(ngModel)]="form.shopName"
          class="mt-2 w-full px-4 py-3 rounded-2xl border"
          placeholder="Enter your shop name"
          [disabled]="loading"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700">GST Number</label>
        <input
          [(ngModel)]="form.gstNumber"
          class="mt-2 w-full px-4 py-3 rounded-2xl border"
          placeholder="Enter GST number (optional)"
          [disabled]="loading"
        />
        <div class="mt-2 text-xs text-gray-500">
          GST is optional, but recommended for complete seller details.
        </div>
      </div>

      <div class="pt-2">
        <button
          type="button"
          class="px-5 py-3 rounded-2xl bg-black text-white hover:opacity-90 disabled:opacity-50"
          (click)="submit()"
          [disabled]="loading"
        >
          {{ loading ? 'Submitting...' : 'Submit Application' }}
        </button>
      </div>
    </div>
  </div>
</section>
